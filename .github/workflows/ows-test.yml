name: OWS Integration Test
on: workflow_dispatch

jobs:
  test-ows-signer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd examples/ows-integration
          npm init -y
          npm install @open-wallet-standard/core @ton/ton @ton/core @ton/crypto typescript ts-node tweetnacl ed25519-hd-key bip39

      - name: Test OWS key derivation compatibility
        run: |
          cd examples/ows-integration
          npx ts-node -e "
          const ows = require('@open-wallet-standard/core');
          const nacl = require('tweetnacl');
          const bip39 = require('bip39');
          const { derivePath, getMasterKeyFromSeed } = require('ed25519-hd-key');
          const { beginCell } = require('@ton/core');

          async function test() {
            console.log('=== Finding correct key derivation for OWS ===\n');

            // 1. Create OWS wallet
            const wallet = ows.createWallet('test-derive');
            const mnemonic = ows.exportWallet('test-derive');
            console.log('Mnemonic words:', mnemonic.split(' ').length);

            // 2. OWS signs a known message
            const testMsg = 'a'.repeat(64); // 32 bytes hex
            const owsSig = ows.signMessage('test-derive', 'ton:mainnet', testMsg, null, 'hex');
            console.log('OWS signature:', owsSig.signature.slice(0, 32) + '...');

            // 3. Try BIP-39 seed + SLIP-10 derivation at m/44'/607'/0'
            const seed = await bip39.mnemonicToSeed(mnemonic);
            console.log('BIP-39 seed:', seed.toString('hex').slice(0, 32) + '...');

            const TON_PATH = \"m/44'/607'/0'\";
            const derived = derivePath(TON_PATH, seed.toString('hex'));
            console.log('SLIP-10 derived key (32 bytes):', derived.key.toString('hex'));

            // Ed25519 keypair from derived seed
            const keyPair = nacl.sign.keyPair.fromSeed(Buffer.from(derived.key));
            const pubKey = Buffer.from(keyPair.publicKey);
            console.log('Derived publicKey:', pubKey.toString('hex'));

            // 4. Verify OWS signature against this publicKey
            const msgBytes = Buffer.from(testMsg, 'hex');
            const sigBytes = Buffer.from(owsSig.signature, 'hex');
            const valid = nacl.sign.detached.verify(msgBytes, sigBytes, keyPair.publicKey);
            console.log('\nBIP-39 + SLIP-10 verification:', valid);

            if (valid) {
              console.log('✓ MATCH! BIP-39 + SLIP-10 at m/44\\''/607\\''/0\\'' produces the same key as OWS');
            }

            // 5. If matched, do the full signer test
            if (valid) {
              console.log('\n=== Full Signer Test ===\n');

              // Build a Cell
              const testCell = beginCell()
                .storeUint(0x00000010, 32)
                .storeUint(12345n, 64)
                .endCell();
              const cellHash = testCell.hash();
              console.log('Cell hash:', cellHash.toString('hex'));

              // Sign via OWS
              const cellSig = ows.signMessage('test-derive', 'ton:mainnet', cellHash.toString('hex'), null, 'hex');
              const cellSigBuf = Buffer.from(cellSig.signature, 'hex');
              console.log('OWS signature:', cellSig.signature.slice(0, 32) + '...');
              console.log('Signature length:', cellSigBuf.length, 'bytes');

              // Verify
              const cellValid = nacl.sign.detached.verify(cellHash, cellSigBuf, keyPair.publicKey);
              console.log('Cell signature valid:', cellValid);

              if (cellValid) {
                console.log('\n═══ ALL TESTS PASSED ═══');
                console.log('Key derivation: BIP-39 seed → SLIP-10 at m/44\\''/607\\''/0\\''');
                console.log('NOT @ton/crypto mnemonicToPrivateKey (uses TON-specific derivation)');
              } else {
                throw new Error('Cell signature verification failed');
              }
            } else {
              // Try other paths
              console.log('\nTrying other derivation paths...');
              for (const path of [\"m/44'/607'/0'/0'\", \"m/44'/607'/0'/0/0\", \"m/44'/607'/0'\", \"m/44'/607'\"] ) {
                try {
                  const d = derivePath(path, seed.toString('hex'));
                  const kp = nacl.sign.keyPair.fromSeed(Buffer.from(d.key));
                  const v = nacl.sign.detached.verify(msgBytes, sigBytes, kp.publicKey);
                  console.log('  ' + path + ':', v ? 'MATCH!' : 'no');
                  if (v) break;
                } catch(e) {
                  console.log('  ' + path + ': error -', e.message);
                }
              }
            }

            ows.deleteWallet('test-derive');
          }

          test().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          "
