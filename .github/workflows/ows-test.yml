name: OWS Integration Test
on: workflow_dispatch

jobs:
  create-wallet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OWS and dependencies
        run: |
          cd examples/ows-integration
          npm init -y
          npm install @open-wallet-standard/core @ton/ton @ton/core @ton/crypto bip39 ed25519-hd-key tweetnacl

      - name: Create OWS wallet and show address
        run: |
          cd examples/ows-integration
          node -e "
          const ows = require('@open-wallet-standard/core');

          // Create wallet
          const wallet = ows.createWallet('enact-test');
          const tonAccount = wallet.accounts.find(a => a.chainId === 'ton:mainnet');

          console.log('=== OWS WALLET CREATED ===');
          console.log('Name:', wallet.name);
          console.log('TON Address:', tonAccount.address);
          console.log('');

          // Export mnemonic (needed to recreate in next run)
          const mnemonic = ows.exportWallet('enact-test');
          console.log('Mnemonic:', mnemonic);
          console.log('');
          console.log('=== SEND 0.15 TON TO THIS ADDRESS ===');
          console.log(tonAccount.address);
          console.log('');

          // Verify signer works
          const bip39 = require('bip39');
          const { derivePath } = require('ed25519-hd-key');
          const nacl = require('tweetnacl');
          const { beginCell } = require('@ton/core');

          (async () => {
            const seed = await bip39.mnemonicToSeed(mnemonic);
            const derived = derivePath(\"m/44'/607'/0'\", seed.toString('hex'));
            const kp = nacl.sign.keyPair.fromSeed(new Uint8Array(derived.key));

            const cell = beginCell().storeUint(0x10, 32).storeUint(99n, 64).endCell();
            const hash = cell.hash();
            const sig = ows.signMessage('enact-test', 'ton:mainnet', hash.toString('hex'), null, 'hex');
            const sigBuf = Buffer.from(sig.signature, 'hex');
            const valid = nacl.sign.detached.verify(hash, sigBuf, kp.publicKey);

            console.log('Signer test:', valid ? 'PASSED' : 'FAILED');
            console.log('Public key:', Buffer.from(kp.publicKey).toString('hex'));

            ows.deleteWallet('enact-test');
          })();
          "
